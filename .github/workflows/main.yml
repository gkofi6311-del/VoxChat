name: Build VoxChat (GitHub Only)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Gradle (no wrapper needed)
        run: sudo apt-get update && sudo apt-get install -y gradle

      - name: Build mod using Gradle
        run: gradle build

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: voxchat
          path: build/libs/*.jar
