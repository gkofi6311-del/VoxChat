name: Build VoxChat

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build mod
        run: gradle build

      - name: Debug output (IMPORTANT)
        run: ls -R build || true

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: voxchat
          path: build/libs/
